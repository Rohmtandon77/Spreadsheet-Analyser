<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpreadX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0ece4;
      color: #1e293b;
      min-height: 100vh;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 270px;
      min-width: 270px;
      background: #1e2a3a;
      border-right: 1px solid #2d3d50;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s, min-width 0.25s;
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
    }

    .sidebar.collapsed .sidebar-header,
    .sidebar.collapsed .sidebar-list { display: none; }

    .sidebar-toggle {
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 100;
      background: #1e2a3a;
      border: 1px solid #3b4a5c;
      border-radius: 6px;
      color: #8896a8;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
    }

    .sidebar-toggle:hover { color: #34d399; border-color: #34d399; }

    .sidebar-header {
      padding: 1rem 0.75rem 0.65rem;
      border-bottom: 1px solid #2d3d50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .sidebar-header h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8896a8;
      font-weight: 600;
      margin-left: 2rem;
    }

    .btn-new-chat {
      background: linear-gradient(135deg, #166534, #15803d);
      border: none;
      border-radius: 6px;
      color: #d1fae5;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.35rem 0.7rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-new-chat:hover { background: linear-gradient(135deg, #15803d, #16a34a); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .sidebar-item {
      padding: 0.55rem 0.7rem;
      cursor: pointer;
      border-radius: 8px;
      background: #253545;
      border: 1px solid #3b4a5c;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .sidebar-item:hover {
      background: #2d3f52;
      border-color: #4a6178;
    }

    .sidebar-item.active {
      background: #2d3f52;
      border-color: #5eead4;
      box-shadow: 0 0 8px rgba(94, 234, 212, 0.15);
    }

    .sidebar-item .item-filename {
      font-size: 0.78rem;
      color: #d1dbe8;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item .item-question {
      font-size: 0.7rem;
      color: #8896a8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item .item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      color: #6b7f96;
      margin-top: 0.1rem;
    }

    .sidebar-item .item-status {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-item .item-status.completed { background: #34d399; }
    .sidebar-item .item-status.failed { background: #f87171; }
    .sidebar-item .item-status.pending { background: #f59e0b; }
    .sidebar-item .item-status.processing { background: #38bdf8; }

    .sidebar-empty {
      padding: 1.5rem 0.75rem;
      color: #6b7f96;
      font-size: 0.8rem;
      text-align: center;
    }

    .main-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 2rem;
      width: 100%;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 90;
      background: #f0ece4;
      border-bottom: 1px solid #ddd6cc;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .top-bar-text {
      flex: 1;
    }

    .top-bar h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #3a3f47;
      -webkit-text-fill-color: #3a3f47;
      margin: 0;
      line-height: 1.2;
    }

    .top-bar p {
      color: #6b7f96;
      font-size: 0.78rem;
      margin: 0.1rem 0 0;
    }

    /* Show more button in sidebar */
    .sidebar-show-more {
      display: block;
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.2rem;
      background: none;
      border: 1px dashed #3b4a5c;
      border-radius: 8px;
      color: #8896a8;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .sidebar-show-more:hover {
      border-color: #5eead4;
      color: #5eead4;
    }

    /* Upload section */
    .upload-section {
      background: #1e2a3a;
      border: 1px solid #2d3d50;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      border: 2px dashed #3b4a5c;
      border-radius: 10px;
      padding: 2.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      margin-bottom: 1rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #5eead4;
      background: rgba(94, 234, 212, 0.06);
    }

    .drop-zone .icon {
      font-size: 2.25rem;
      margin-bottom: 0.5rem;
    }

    .drop-zone p {
      color: #8896a8;
      font-size: 0.9rem;
    }

    .drop-zone .file-name {
      color: #d1dbe8;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      background: #253545;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .file-info .remove-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: #6b7f96;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
    }

    .file-info .remove-btn:hover { color: #f87171; }

    .question-row {
      display: flex;
      gap: 0.5rem;
    }

    .question-row input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      background: #253545;
      border: 1px solid #3b4a5c;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #d1dbe8;
      outline: none;
      transition: border-color 0.2s;
    }

    .question-row input::placeholder { color: #6b7f96; }
    .question-row input:focus { border-color: #5eead4; }

    .btn {
      padding: 0.7rem 1.35rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #15803d, #34d399);
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.25);
    }

    .btn-primary:disabled {
      background: #253545;
      color: #6b7f96;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Chat / conversation */
    .chat-section {
      background: #1e2a3a;
      border: 1px solid #2d3d50;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .chat-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #2d3d50;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #172030;
    }

    .chat-header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }

    .chat-header .status-dot.pending { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
    .chat-header .status-dot.processing { background: #38bdf8; animation: pulse 1s infinite; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    .chat-header .status-dot.completed { background: #34d399; box-shadow: 0 0 8px rgba(52, 211, 153, 0.4); }
    .chat-header .status-dot.failed { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .chat-header .status-text {
      font-size: 0.75rem;
      color: #8896a8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chat-header .file-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .messages {
      padding: 1.25rem;
      max-height: 60vh;
      overflow-y: auto;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #3b4a5c; border-radius: 3px; }

    .message {
      margin-bottom: 1.5rem;
    }

    .message .role {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .message.user .role { color: #0ea5e9; }
    .message.assistant .role { color: #34d399; }

    .message.user .content {
      color: #8896a8;
      font-size: 0.9rem;
    }

    .message.assistant .content {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #d1dbe8;
    }

    .message .code-block {
      background: #151e2c;
      color: #86efac;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      border: 1px solid #2d3d50;
      font-family: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
      font-size: 0.78rem;
      overflow-x: auto;
      margin-top: 0.6rem;
      white-space: pre;
      line-height: 1.5;
    }

    .message .chart-img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 0.85rem;
      border: 1px solid #2d3d50;
    }

    /* Final answer -- prominent */
    .final-answer {
      font-size: 1.05rem;
      font-weight: 500;
      color: #d1dbe8;
      padding: 0.6rem 0;
      line-height: 1.6;
    }

    /* Thinking block */
    .thinking-block {
      background: #151e2c;
      color: #8896a8;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid #2d3d50;
      font-size: 0.82rem;
      line-height: 1.55;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    /* Collapsible sections */
    .collapsible {
      margin-top: 0.5rem;
    }

    .collapsible summary {
      cursor: pointer;
      color: #6b7f96;
      font-size: 0.78rem;
      padding: 0.3rem 0;
      user-select: none;
      transition: color 0.2s;
    }

    .collapsible summary:hover { color: #34d399; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #3b4a5c;
      border-top-color: #5eead4;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .message .stdout-block {
      background: #151e2c;
      color: #5eead4;
      padding: 0.55rem 0.85rem;
      border-radius: 6px;
      border: 1px solid #2d3d50;
      font-family: monospace;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      white-space: pre-wrap;
    }

    /* Follow-up input */
    .followup-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-top: 1px solid #2d3d50;
      background: #172030;
    }

    .followup-row input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: #253545;
      border: 1px solid #3b4a5c;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #d1dbe8;
      outline: none;
    }

    .followup-row input::placeholder { color: #6b7f96; }
    .followup-row input:focus { border-color: #5eead4; }

    /* Mic button */
    .btn-mic {
      width: 40px;
      height: 40px;
      border: 1px solid #3b4a5c;
      border-radius: 8px;
      background: #253545;
      color: #8896a8;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-mic:hover { border-color: #5eead4; color: #5eead4; }

    .btn-mic.recording {
      background: rgba(239, 68, 68, 0.15);
      border-color: #f87171;
      color: #f87171;
      animation: pulse 0.8s infinite;
    }

    /* Audio player inline */
    .audio-player {
      margin-top: 0.5rem;
    }

    .audio-player audio {
      height: 32px;
      width: 100%;
      border-radius: 6px;
    }

    /* Error */
    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    /* TTS toggle */
    .conv-toggle {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      border: 1px solid #3b4a5c;
      background: #1e2a3a;
      color: #6b7f96;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .conv-toggle:hover {
      border-color: #4a8f6a;
      color: #8aa89c;
    }

    .conv-toggle.active {
      background: rgba(52, 211, 153, 0.12);
      border-color: #34d399;
      color: #34d399;
      box-shadow: 0 0 14px rgba(52, 211, 153, 0.25), 0 0 4px rgba(52, 211, 153, 0.15);
    }

    .mic-svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vertical-align: -2px;
    }

    /* Speak / mic button on answers */
    .btn-speak {
      background: none;
      border: 1px solid #3b4a5c;
      border-radius: 6px;
      color: #8896a8;
      cursor: pointer;
      padding: 0.25rem 0.4rem;
      margin-left: 0.5rem;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-speak:hover { color: #5eead4; border-color: #5eead4; }
    .btn-speak.speaking { color: #34d399; border-color: #34d399; }
    .btn-speak.recording { color: #f87171; border-color: #f87171; animation: pulse 0.8s infinite; }

    .answer-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">&#9776;</button>
  <div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>History</h2>
      <button class="btn-new-chat" id="newChatBtn">+ New Chat</button>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-empty">No jobs yet</div>
    </div>
  </aside>
  <div class="main-col">
    <div class="top-bar">
      <div class="top-bar-text">
        <h1>SpreadX</h1>
        <p>Upload a CSV or Excel file and ask questions about your data.</p>
      </div>
      <button class="conv-toggle" id="convToggle" title="Toggle conversation mode">
        <svg class="mic-svg" viewBox="0 0 24 24" width="14" height="14"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        Conversation mode
      </button>
    </div>
    <div class="container">

    <div id="errorBanner" class="error-banner hidden"></div>

    <!-- Upload Section -->
    <div id="uploadSection" class="upload-section">
      <div id="dropZone" class="drop-zone">
        <div class="icon">&#128196;</div>
        <p>Drop a CSV or Excel file here, or click to browse</p>
      </div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none">

      <div id="fileInfo" class="file-info hidden">
        <span id="fileInfoName"></span>
        <button class="remove-btn" id="removeFileBtn">&times;</button>
      </div>

      <div class="question-row">
        <input type="text" id="questionInput" placeholder="Ask a question about your data ..." />
        <button class="btn-mic" id="micBtn" title="Record voice question"><svg class="mic-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
        <button class="btn btn-primary" id="submitBtn" disabled>Analyze</button>
      </div>
    </div>

    <!-- Chat Section (shown after first submit) -->
    <div id="chatSection" class="chat-section hidden">
      <div class="chat-header">
        <span class="status-dot" id="statusDot"></span>
        <span class="file-label" id="chatFileName"></span>
        <span class="status-text" id="statusText"></span>
      </div>
      <div class="messages" id="messagesContainer"></div>
      <div class="followup-row" id="followupRow">
        <input type="text" id="followupInput" placeholder="Ask a follow-up question ..." />
        <button class="btn-mic" id="micFollowupBtn" title="Record voice follow-up"><svg class="mic-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
        <button class="btn btn-primary" id="followupBtn">Send</button>
      </div>
    </div>
  </div><!-- /container -->
  </div><!-- /main-col -->
  </div><!-- /app-layout -->

  <script>
    const API = window.location.origin;
    const MIC_SVG = '<svg class="mic-svg" viewBox="0 0 24 24" width="16" height="16"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
    const sidebarList = document.getElementById("sidebarList");
    const sidebar = document.getElementById("sidebar");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const newChatBtn = document.getElementById("newChatBtn");
    let currentJobId = null;
    let selectedFile = null;
    let polling = false;

    // DOM elements
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileInfoName = document.getElementById("fileInfoName");
    const removeFileBtn = document.getElementById("removeFileBtn");
    const questionInput = document.getElementById("questionInput");
    const submitBtn = document.getElementById("submitBtn");
    const uploadSection = document.getElementById("uploadSection");
    const chatSection = document.getElementById("chatSection");
    const chatFileName = document.getElementById("chatFileName");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const messagesContainer = document.getElementById("messagesContainer");
    const followupInput = document.getElementById("followupInput");
    const followupBtn = document.getElementById("followupBtn");
    const followupRow = document.getElementById("followupRow");
    const errorBanner = document.getElementById("errorBanner");

    // Sidebar toggle
    sidebarToggle.addEventListener("click", () => {
      sidebar.classList.toggle("collapsed");
    });

    // New chat
    newChatBtn.addEventListener("click", () => {
      currentJobId = null;
      localStorage.removeItem("sa_current_job");
      polling = false;
      chatSection.classList.add("hidden");
      uploadSection.classList.remove("hidden");
      messagesContainer.innerHTML = "";
      _lastSpokenMsgCount = 0;
      hideError();
      document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    });

    // --- File handling ---
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files.length) setFile(fileInput.files[0]); });
    removeFileBtn.addEventListener("click", clearFile);

    function setFile(file) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["csv", "xlsx", "xls"].includes(ext)) {
        showError("Only CSV and Excel files are supported.");
        return;
      }
      selectedFile = file;
      fileInfo.classList.remove("hidden");
      fileInfoName.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      dropZone.innerHTML = `<div class="icon">&#9989;</div><p class="file-name">${file.name}</p>`;
      updateSubmitState();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = "";
      fileInfo.classList.add("hidden");
      dropZone.innerHTML = `<div class="icon">&#128196;</div><p>Drop a CSV or Excel file here, or click to browse</p>`;
      updateSubmitState();
    }

    function updateSubmitState() {
      submitBtn.disabled = !(selectedFile && questionInput.value.trim());
    }

    questionInput.addEventListener("input", updateSubmitState);
    questionInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !submitBtn.disabled) submitJob(); });
    submitBtn.addEventListener("click", submitJob);
    followupBtn.addEventListener("click", submitFollowup);
    followupInput.addEventListener("keydown", (e) => { if (e.key === "Enter") submitFollowup(); });

    // --- API calls ---
    async function submitJob() {
      hideError();
      const question = questionInput.value.trim();
      if (!selectedFile || !question) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting ...";

      const form = new FormData();
      form.append("file", selectedFile);
      form.append("question", question);

      try {
        const res = await fetch(`${API}/jobs`, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Submit failed");
        }
        const data = await res.json();
        currentJobId = data.job_id;
        localStorage.setItem("sa_current_job", data.job_id);

        chatFileName.textContent = selectedFile.name;
        chatSection.classList.remove("hidden");
        messagesContainer.innerHTML = "";
        questionInput.value = "";
        _lastSpokenMsgCount = 0;
        updateSubmitState();
        setStatus("pending");
        loadSidebar();
        startPolling();
      } catch (e) {
        showError(e.message);
      } finally {
        submitBtn.textContent = "Analyze";
        submitBtn.disabled = false;
        updateSubmitState();
      }
    }

    async function submitFollowup() {
      const question = followupInput.value.trim();
      if (!question || !currentJobId) return;

      followupBtn.disabled = true;
      followupInput.value = "";

      const form = new FormData();
      form.append("question", question);

      try {
        const res = await fetch(`${API}/jobs/${currentJobId}/followup`, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Follow-up failed");
        }
        setStatus("pending");
        startPolling();
      } catch (e) {
        showError(e.message);
      } finally {
        followupBtn.disabled = false;
      }
    }

    async function startPolling() {
      if (polling) return;
      polling = true;
      followupRow.style.pointerEvents = "none";
      followupRow.style.opacity = "0.5";

      let pollBackoff = 1500;
      while (polling) {
        try {
          const res = await fetch(`${API}/jobs/${currentJobId}/status`);
          if (!res.ok) throw new Error(`Status ${res.status}`);
          const data = await res.json();
          setStatus(data.status);
          pollBackoff = 1500;

          if (data.status === "completed" || data.status === "failed") {
            polling = false;
            await fetchAndRenderResults();
            if (data.status === "failed" && data.error) {
              showError("Analysis failed: " + data.error);
            }
            followupRow.style.pointerEvents = "";
            followupRow.style.opacity = "";
            followupInput.focus();
            loadSidebar();
            break;
          }
        } catch (e) {
          console.error("Poll error:", e);
          pollBackoff = Math.min(pollBackoff * 2, 10000);
        }
        await sleep(pollBackoff);
      }
    }

    async function fetchAndRenderResults() {
      const res = await fetch(`${API}/jobs/${currentJobId}/results`);
      if (!res.ok) { showError("Failed to load results."); return; }
      const data = await res.json();

      messagesContainer.innerHTML = "";

      for (const msg of data.messages) {
        const el = document.createElement("div");
        el.className = `message ${msg.role}`;

        let html = `<div class="role">${msg.role}</div>`;

        if (msg.role === "assistant") {
          const answerText = escapeHtml(msg.content);
          const safeAttr = msg.content.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
          html += `<div class="answer-header"><div class="final-answer">${answerText}</div><button class="btn-speak" data-text="${safeAttr}" title="Read aloud / Speak follow-up">${MIC_SVG}</button></div>`;
          if (msg.thinking) {
            html += `<details class="collapsible"><summary>View thought process</summary><div class="thinking-block">${escapeHtml(msg.thinking)}</div></details>`;
          }
        } else {
          html += `<div class="content">${escapeHtml(msg.content)}</div>`;
        }

        if (msg.code) {
          html += `<details class="collapsible"><summary>View code</summary><div class="code-block">${escapeHtml(msg.code)}</div></details>`;
        }
        if (msg.execution_output) {
          html += `<details class="collapsible"><summary>Execution output</summary><div class="stdout-block">${escapeHtml(msg.execution_output)}</div></details>`;
        }

        el.innerHTML = html;
        messagesContainer.appendChild(el);

        // Render charts for this message
        const msgArtifacts = data.artifacts.filter(a => a.message_id === msg.id && a.type === "chart");
        for (const art of msgArtifacts) {
          const img = document.createElement("img");
          img.className = "chart-img";
          img.src = art.url;
          img.alt = art.filename;
          el.appendChild(img);
        }
      }

      if (data.job.error) {
        showError(`Job error: ${data.job.error}`);
      }

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      speakLatestIfNew();
    }

    // --- Helpers ---
    function setStatus(status) {
      statusDot.className = `status-dot ${status}`;
      if (status === "processing" || status === "pending") {
        statusText.innerHTML = status + ' <span class="spinner"></span>';
      } else {
        statusText.textContent = status;
      }
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove("hidden");
    }

    function hideError() {
      errorBanner.classList.add("hidden");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // --- Voice: STT + TTS ---
    const micBtn = document.getElementById("micBtn");
    const micFollowupBtn = document.getElementById("micFollowupBtn");

    function setupMic(btn, targetInput, autoSubmitFn) {
      let mediaRecorder = null;
      let chunks = [];

      btn.addEventListener("click", async () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];

          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            btn.classList.remove("recording");
            btn.innerHTML = MIC_SVG;

            const blob = new Blob(chunks, { type: "audio/webm" });
            const form = new FormData();
            form.append("audio", blob, "recording.webm");

            try {
              btn.innerHTML = "...";
              const res = await fetch(`${API}/voice/stt`, { method: "POST", body: form });
              if (!res.ok) throw new Error("STT failed");
              const data = await res.json();
              targetInput.value = data.text;
              targetInput.dispatchEvent(new Event("input"));

              if (convModeOn && autoSubmitFn) {
                autoSubmitFn();
              } else {
                targetInput.focus();
              }
            } catch (e) {
              showError("Voice transcription failed: " + e.message);
            } finally {
              btn.innerHTML = MIC_SVG;
            }
          };

          mediaRecorder.start();
          btn.classList.add("recording");
          btn.innerHTML = "&#9209;";
        } catch (e) {
          showError("Microphone access denied.");
        }
      });
    }

    setupMic(micBtn, questionInput, () => submitBtn.click());
    setupMic(micFollowupBtn, followupInput, () => submitFollowup());

    const convToggle = document.getElementById("convToggle");
    let convModeOn = false;
    convToggle.addEventListener("click", () => {
      convModeOn = !convModeOn;
      convToggle.classList.toggle("active", convModeOn);
    });

    async function playTTS(text, speakBtn) {
      try {
        if (speakBtn) { speakBtn.classList.add("speaking"); speakBtn.textContent = "..."; }
        const truncated = text.substring(0, 500);
        const res = await fetch(`${API}/voice/tts?text=${encodeURIComponent(truncated)}`, { method: "POST" });
        if (!res.ok) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => { if (speakBtn) { speakBtn.classList.remove("speaking"); speakBtn.innerHTML = MIC_SVG; } };
        audio.play();
      } catch (e) {
        console.warn("TTS playback failed:", e);
        if (speakBtn) { speakBtn.classList.remove("speaking"); speakBtn.innerHTML = MIC_SVG; }
      }
    }

    let _lastSpokenMsgCount = 0;

    function speakLatestIfNew() {
      if (!convModeOn) return;
      const answers = document.querySelectorAll(".message.assistant .final-answer");
      if (answers.length > _lastSpokenMsgCount) {
        _lastSpokenMsgCount = answers.length;
        const lastAnswer = answers[answers.length - 1];
        const btn = lastAnswer.parentElement.querySelector(".btn-speak");
        playTTS(lastAnswer.textContent, btn);
      }
    }

    let _inlineMicRecorder = null;
    let _inlineMicChunks = [];

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn-speak");
      if (!btn) return;

      if (convModeOn) {
        // Conversation mode ON: mic records a follow-up question
        if (_inlineMicRecorder && _inlineMicRecorder.state === "recording") {
          _inlineMicRecorder.stop();
          return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          _inlineMicRecorder = new MediaRecorder(stream);
          _inlineMicChunks = [];
          _inlineMicRecorder.ondataavailable = (ev) => _inlineMicChunks.push(ev.data);
          _inlineMicRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            btn.classList.remove("recording");
            btn.innerHTML = MIC_SVG;
            const blob = new Blob(_inlineMicChunks, { type: "audio/webm" });
            const form = new FormData();
            form.append("audio", blob, "recording.webm");
            try {
              btn.innerHTML = "...";
              const res = await fetch(`${API}/voice/stt`, { method: "POST", body: form });
              if (!res.ok) throw new Error("STT failed");
              const data = await res.json();
              followupInput.value = data.text;
              submitFollowup();
            } catch (err) {
              showError("Voice transcription failed: " + err.message);
            } finally {
              btn.innerHTML = MIC_SVG;
            }
          };
          _inlineMicRecorder.start();
          btn.classList.add("recording");
          btn.innerHTML = "&#9209;";
        }).catch(() => showError("Microphone access denied."));
      } else {
        // Conversation mode OFF: read this answer aloud
        const text = btn.dataset.text;
        if (text) playTTS(text, btn);
      }
    });

    // --- Job History Sidebar ---
    const SIDEBAR_INITIAL = 5;
    let _sidebarExpanded = false;
    let _sidebarJobs = [];

    function renderSidebarItem(job) {
      const item = document.createElement("div");
      item.className = "sidebar-item" + (job.id === currentJobId ? " active" : "");
      item.dataset.jobId = job.id;
      const time = new Date(job.created_at).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const question = job.first_question ? escapeHtml(job.first_question.substring(0, 60)) : "";
      item.innerHTML = `
        <div class="item-filename">${escapeHtml(job.original_filename)}</div>
        ${question ? `<div class="item-question">${question}</div>` : ""}
        <div class="item-meta">
          <span class="item-status ${job.status}"></span>
          <span>${job.status}</span>
          <span>&middot;</span>
          <span>${time}</span>
        </div>
      `;
      item.addEventListener("click", () => loadJob(job.id, job.original_filename));
      return item;
    }

    function renderSidebar() {
      if (_sidebarJobs.length === 0) {
        sidebarList.innerHTML = '<div class="sidebar-empty">No jobs yet</div>';
        return;
      }
      sidebarList.innerHTML = "";
      const visibleJobs = _sidebarExpanded ? _sidebarJobs : _sidebarJobs.slice(0, SIDEBAR_INITIAL);
      for (const job of visibleJobs) {
        sidebarList.appendChild(renderSidebarItem(job));
      }
      const remaining = _sidebarJobs.length - SIDEBAR_INITIAL;
      if (remaining > 0 && !_sidebarExpanded) {
        const btn = document.createElement("button");
        btn.className = "sidebar-show-more";
        btn.textContent = `Show ${remaining} more`;
        btn.addEventListener("click", () => { _sidebarExpanded = true; renderSidebar(); });
        sidebarList.appendChild(btn);
      } else if (_sidebarExpanded && _sidebarJobs.length > SIDEBAR_INITIAL) {
        const btn = document.createElement("button");
        btn.className = "sidebar-show-more";
        btn.textContent = "Show less";
        btn.addEventListener("click", () => { _sidebarExpanded = false; renderSidebar(); });
        sidebarList.appendChild(btn);
      }
    }

    async function loadSidebar() {
      try {
        const res = await fetch(`${API}/jobs`);
        if (!res.ok) return;
        _sidebarJobs = await res.json();
        renderSidebar();
      } catch (e) {
        console.warn("Sidebar load failed:", e);
      }
    }

    async function loadJob(jobId, filename) {
      currentJobId = jobId;
      localStorage.setItem("sa_current_job", jobId);
      polling = false;
      hideError();

      uploadSection.classList.add("hidden");
      chatSection.classList.remove("hidden");
      chatFileName.textContent = filename || "File";
      messagesContainer.innerHTML = "";
      _lastSpokenMsgCount = 0;

      // Highlight in sidebar
      document.querySelectorAll(".sidebar-item").forEach(el => {
        el.classList.toggle("active", el.dataset.jobId === jobId);
      });

      // Check status
      try {
        const statusRes = await fetch(`${API}/jobs/${jobId}/status`);
        if (statusRes.ok) {
          const data = await statusRes.json();
          setStatus(data.status);
          if (data.status === "pending" || data.status === "processing") {
            startPolling();
          } else {
            await fetchAndRenderResults();
          }
        }
      } catch (e) {
        showError("Failed to load job.");
      }
    }

    // On page load: restore last job or load sidebar
    (async function init() {
      await loadSidebar();
      const savedJob = localStorage.getItem("sa_current_job");
      if (savedJob) {
        // Find the job in sidebar to get filename
        const item = document.querySelector(`.sidebar-item[data-job-id="${savedJob}"]`);
        if (item) {
          const filename = item.querySelector(".item-filename")?.textContent || "File";
          await loadJob(savedJob, filename);
        }
      }
    })();
  </script>
</body>
