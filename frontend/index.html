<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    /* Upload section */
    .upload-section {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      border: 2px dashed #334155;
      border-radius: 10px;
      padding: 2.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      margin-bottom: 1rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #818cf8;
      background: rgba(129, 140, 248, 0.06);
    }

    .drop-zone .icon {
      font-size: 2.25rem;
      margin-bottom: 0.5rem;
    }

    .drop-zone p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .drop-zone .file-name {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .file-info .remove-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
    }

    .file-info .remove-btn:hover { color: #f87171; }

    .question-row {
      display: flex;
      gap: 0.5rem;
    }

    .question-row input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }

    .question-row input::placeholder { color: #475569; }
    .question-row input:focus { border-color: #818cf8; }

    .btn {
      padding: 0.7rem 1.35rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
    }

    .btn-primary:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Chat / conversation */
    .chat-section {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .chat-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #0f172a;
    }

    .chat-header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }

    .chat-header .status-dot.pending { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
    .chat-header .status-dot.processing { background: #38bdf8; animation: pulse 1s infinite; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    .chat-header .status-dot.completed { background: #34d399; box-shadow: 0 0 8px rgba(52, 211, 153, 0.4); }
    .chat-header .status-dot.failed { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .chat-header .status-text {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chat-header .file-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .messages {
      padding: 1.25rem;
      max-height: 60vh;
      overflow-y: auto;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .message {
      margin-bottom: 1.5rem;
    }

    .message .role {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .message.user .role { color: #818cf8; }
    .message.assistant .role { color: #34d399; }

    .message.user .content {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .message.assistant .content {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #e2e8f0;
    }

    .message .code-block {
      background: #0a0e1a;
      color: #a5b4fc;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      border: 1px solid #1e293b;
      font-family: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
      font-size: 0.78rem;
      overflow-x: auto;
      margin-top: 0.6rem;
      white-space: pre;
      line-height: 1.5;
    }

    .message .chart-img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 0.85rem;
      border: 1px solid #1e293b;
    }

    /* Collapsible sections */
    .collapsible {
      margin-top: 0.5rem;
    }

    .collapsible summary {
      cursor: pointer;
      color: #64748b;
      font-size: 0.78rem;
      padding: 0.3rem 0;
      user-select: none;
      transition: color 0.2s;
    }

    .collapsible summary:hover { color: #818cf8; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #334155;
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .message .stdout-block {
      background: #0f172a;
      color: #38bdf8;
      padding: 0.55rem 0.85rem;
      border-radius: 6px;
      border: 1px solid #1e293b;
      font-family: monospace;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      white-space: pre-wrap;
    }

    /* Follow-up input */
    .followup-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-top: 1px solid #1e293b;
      background: #0f172a;
    }

    .followup-row input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #e2e8f0;
      outline: none;
    }

    .followup-row input::placeholder { color: #475569; }
    .followup-row input:focus { border-color: #818cf8; }

    /* Mic button */
    .btn-mic {
      width: 40px;
      height: 40px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #64748b;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-mic:hover { border-color: #818cf8; color: #818cf8; }

    .btn-mic.recording {
      background: rgba(239, 68, 68, 0.15);
      border-color: #f87171;
      color: #f87171;
      animation: pulse 0.8s infinite;
    }

    /* Audio player inline */
    .audio-player {
      margin-top: 0.5rem;
    }

    .audio-player audio {
      height: 32px;
      width: 100%;
      border-radius: 6px;
    }

    /* Error */
    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Spreadsheet Analysis</h1>
      <p>Upload a CSV or Excel file and ask questions about your data.</p>
    </header>

    <div id="errorBanner" class="error-banner hidden"></div>

    <!-- Upload Section -->
    <div id="uploadSection" class="upload-section">
      <div id="dropZone" class="drop-zone">
        <div class="icon">&#128196;</div>
        <p>Drop a CSV or Excel file here, or click to browse</p>
      </div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none">

      <div id="fileInfo" class="file-info hidden">
        <span id="fileInfoName"></span>
        <button class="remove-btn" id="removeFileBtn">&times;</button>
      </div>

      <div class="question-row">
        <input type="text" id="questionInput" placeholder="Ask a question about your data ..." />
        <button class="btn-mic" id="micBtn" title="Record voice question">&#127908;</button>
        <button class="btn btn-primary" id="submitBtn" disabled>Analyze</button>
      </div>
    </div>

    <!-- Chat Section (shown after first submit) -->
    <div id="chatSection" class="chat-section hidden">
      <div class="chat-header">
        <span class="status-dot" id="statusDot"></span>
        <span class="file-label" id="chatFileName"></span>
        <span class="status-text" id="statusText"></span>
      </div>
      <div class="messages" id="messagesContainer"></div>
      <div class="followup-row" id="followupRow">
        <input type="text" id="followupInput" placeholder="Ask a follow-up question ..." />
        <button class="btn-mic" id="micFollowupBtn" title="Record voice follow-up">&#127908;</button>
        <button class="btn btn-primary" id="followupBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentJobId = null;
    let selectedFile = null;
    let polling = false;

    // DOM elements
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileInfoName = document.getElementById("fileInfoName");
    const removeFileBtn = document.getElementById("removeFileBtn");
    const questionInput = document.getElementById("questionInput");
    const submitBtn = document.getElementById("submitBtn");
    const uploadSection = document.getElementById("uploadSection");
    const chatSection = document.getElementById("chatSection");
    const chatFileName = document.getElementById("chatFileName");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const messagesContainer = document.getElementById("messagesContainer");
    const followupInput = document.getElementById("followupInput");
    const followupBtn = document.getElementById("followupBtn");
    const followupRow = document.getElementById("followupRow");
    const errorBanner = document.getElementById("errorBanner");

    // --- File handling ---
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files.length) setFile(fileInput.files[0]); });
    removeFileBtn.addEventListener("click", clearFile);

    function setFile(file) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["csv", "xlsx", "xls"].includes(ext)) {
        showError("Only CSV and Excel files are supported.");
        return;
      }
      selectedFile = file;
      fileInfo.classList.remove("hidden");
      fileInfoName.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      dropZone.innerHTML = `<div class="icon">&#9989;</div><p class="file-name">${file.name}</p>`;
      updateSubmitState();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = "";
      fileInfo.classList.add("hidden");
      dropZone.innerHTML = `<div class="icon">&#128196;</div><p>Drop a CSV or Excel file here, or click to browse</p>`;
      updateSubmitState();
    }

    function updateSubmitState() {
      submitBtn.disabled = !(selectedFile && questionInput.value.trim());
    }

    questionInput.addEventListener("input", updateSubmitState);
    questionInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !submitBtn.disabled) submitJob(); });
    submitBtn.addEventListener("click", submitJob);
    followupBtn.addEventListener("click", submitFollowup);
    followupInput.addEventListener("keydown", (e) => { if (e.key === "Enter") submitFollowup(); });

    // --- API calls ---
    async function submitJob() {
      hideError();
      const question = questionInput.value.trim();
      if (!selectedFile || !question) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting ...";

      const form = new FormData();
      form.append("file", selectedFile);
      form.append("question", question);

      try {
        const res = await fetch(`${API}/jobs`, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Submit failed");
        }
        const data = await res.json();
        currentJobId = data.job_id;

        chatFileName.textContent = selectedFile.name;
        chatSection.classList.remove("hidden");
        messagesContainer.innerHTML = "";
        questionInput.value = "";
        updateSubmitState();
        setStatus("pending");
        startPolling();
      } catch (e) {
        showError(e.message);
      } finally {
        submitBtn.textContent = "Analyze";
        submitBtn.disabled = false;
        updateSubmitState();
      }
    }

    async function submitFollowup() {
      const question = followupInput.value.trim();
      if (!question || !currentJobId) return;

      followupBtn.disabled = true;
      followupInput.value = "";

      const form = new FormData();
      form.append("question", question);

      try {
        const res = await fetch(`${API}/jobs/${currentJobId}/followup`, { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Follow-up failed");
        }
        setStatus("pending");
        startPolling();
      } catch (e) {
        showError(e.message);
      } finally {
        followupBtn.disabled = false;
      }
    }

    async function startPolling() {
      if (polling) return;
      polling = true;
      followupRow.style.pointerEvents = "none";
      followupRow.style.opacity = "0.5";

      let pollBackoff = 1500;
      while (polling) {
        try {
          const res = await fetch(`${API}/jobs/${currentJobId}/status`);
          if (!res.ok) throw new Error(`Status ${res.status}`);
          const data = await res.json();
          setStatus(data.status);
          pollBackoff = 1500;

          if (data.status === "completed" || data.status === "failed") {
            polling = false;
            await fetchAndRenderResults();
            if (data.status === "failed" && data.error) {
              showError("Analysis failed: " + data.error);
            }
            followupRow.style.pointerEvents = "";
            followupRow.style.opacity = "";
            followupInput.focus();
            break;
          }
        } catch (e) {
          console.error("Poll error:", e);
          pollBackoff = Math.min(pollBackoff * 2, 10000);
        }
        await sleep(pollBackoff);
      }
    }

    async function fetchAndRenderResults() {
      const res = await fetch(`${API}/jobs/${currentJobId}/results`);
      if (!res.ok) { showError("Failed to load results."); return; }
      const data = await res.json();

      messagesContainer.innerHTML = "";

      for (const msg of data.messages) {
        const el = document.createElement("div");
        el.className = `message ${msg.role}`;

        let html = `<div class="role">${msg.role}</div>`;
        html += `<div class="content">${escapeHtml(msg.content)}</div>`;

        if (msg.code) {
          html += `<details class="collapsible"><summary>View code</summary><div class="code-block">${escapeHtml(msg.code)}</div></details>`;
        }
        if (msg.execution_output) {
          html += `<details class="collapsible"><summary>Execution output</summary><div class="stdout-block">${escapeHtml(msg.execution_output)}</div></details>`;
        }

        el.innerHTML = html;
        messagesContainer.appendChild(el);

        // Render charts for this message
        const msgArtifacts = data.artifacts.filter(a => a.message_id === msg.id && a.type === "chart");
        for (const art of msgArtifacts) {
          const img = document.createElement("img");
          img.className = "chart-img";
          img.src = art.url;
          img.alt = art.filename;
          el.appendChild(img);
        }
      }

      if (data.job.error) {
        showError(`Job error: ${data.job.error}`);
      }

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      speakLatestIfNew();
    }

    // --- Helpers ---
    function setStatus(status) {
      statusDot.className = `status-dot ${status}`;
      if (status === "processing" || status === "pending") {
        statusText.innerHTML = status + ' <span class="spinner"></span>';
      } else {
        statusText.textContent = status;
      }
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove("hidden");
    }

    function hideError() {
      errorBanner.classList.add("hidden");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // --- Voice: STT + TTS ---
    const micBtn = document.getElementById("micBtn");
    const micFollowupBtn = document.getElementById("micFollowupBtn");

    function setupMic(btn, targetInput) {
      let mediaRecorder = null;
      let chunks = [];

      btn.addEventListener("click", async () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];

          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            btn.classList.remove("recording");
            btn.innerHTML = "&#127908;";

            const blob = new Blob(chunks, { type: "audio/webm" });
            const form = new FormData();
            form.append("audio", blob, "recording.webm");

            try {
              btn.innerHTML = "...";
              const res = await fetch(`${API}/voice/stt`, { method: "POST", body: form });
              if (!res.ok) throw new Error("STT failed");
              const data = await res.json();
              targetInput.value = data.text;
              targetInput.dispatchEvent(new Event("input"));
              targetInput.focus();
            } catch (e) {
              showError("Voice transcription failed: " + e.message);
            } finally {
              btn.innerHTML = "&#127908;";
            }
          };

          mediaRecorder.start();
          btn.classList.add("recording");
          btn.innerHTML = "&#9209;";
        } catch (e) {
          showError("Microphone access denied.");
        }
      });
    }

    setupMic(micBtn, questionInput);
    setupMic(micFollowupBtn, followupInput);

    async function playTTS(text) {
      try {
        const truncated = text.substring(0, 500);
        const res = await fetch(`${API}/voice/tts?text=${encodeURIComponent(truncated)}`, { method: "POST" });
        if (!res.ok) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
      } catch (e) {
        console.warn("TTS playback failed:", e);
      }
    }

    let _lastSpokenMsgCount = 0;

    function speakLatestIfNew() {
      const msgs = document.querySelectorAll(".message.assistant .content");
      if (msgs.length > _lastSpokenMsgCount) {
        _lastSpokenMsgCount = msgs.length;
        playTTS(msgs[msgs.length - 1].textContent);
      }
    }
  </script>
</body>
</html>
